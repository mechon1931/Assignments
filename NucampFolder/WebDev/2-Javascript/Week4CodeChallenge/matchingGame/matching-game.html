<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matching Game</title>
  <link rel="stylesheet" href="matching-game.css">
</head>
<body>
  <div class="game-container">
    <header class="header">
      <h1 >Matching Game</h1>
      <p>Click the extra Smiley Face</p>
    </header>

      <div class="board">
        <div class="left-side" id="leftSide"></div>
        <div class="right-side" id="rightSide"></div>
      </div>

      <div class="button-container" >
        <button class="start-button" id="startButton" onclick="startGame()">Start Game</button>
      </div>
  </div>
<script src="./matching-game.js"></script>
</body>
</html>
