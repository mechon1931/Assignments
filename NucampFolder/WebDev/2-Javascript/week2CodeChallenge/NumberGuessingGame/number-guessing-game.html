<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <!-- Add Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center">
            <h1 class="mb-4">Number Guessing Game</h1>
        </header>
        
        <main>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card text-center">
                        <div class="card-body">
                            <h2 class="card-title">Guess the Number</h2>
                            <button type="button" class="btn btn-primary" onclick="runGame()">Submit Guess</button>
                            <h2 id='guess-history' class="card-title">Guess History:</h2>

                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="text-center mt-4">
            <p>&copy; 2023 Number Guessing Game</p>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="/NumberGuessingGame/number-guessing-game.js" defer></script>
</body>
</html>
