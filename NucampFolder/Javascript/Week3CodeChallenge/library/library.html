<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">
  <h1 class="mb-4">Welcome to the Library</h1>

  <p>This is a library management simulation where you can add, check out, and list available books.</p>

  <h2 class="mt-4">Library Actions</h2>

  <div class="mb-3">
    <label for="title">Title:</label>
    <input type="text" id="title" placeholder="Enter book title"><br><br>
  </div>

  <div class="mb-3">
    <label for="author">Author:</label>
    <input type="text" id="author" placeholder="Enter author"><br><br>
  </div>

  <button  class="btn btn-primary me-2" onclick="addBook()">Add Book</button>
  <button class="btn btn-primary me-2" onclick="checkOutBook()">Check Out Book</button>
  <button class="btn btn-primary" onclick="listAvailableBooks()">List Available Books</button>

  <div id="output" class="mt-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./library.js" defer></script>

</body>
</html>
